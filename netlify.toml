[build]
  publish = "frontend/dist"
  command = "cd frontend && npm run build"

[build.environment]
  NODE_VERSION = "18"
  VITE_API_URL = "https://your-backend-url.vercel.app"

[[redirects]]
  from = "/api/*"
  to = "https://your-backend-url.vercel.app/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  publish = "frontend/dist"
  command = "cd frontend && npm run dev"
  port = 5173